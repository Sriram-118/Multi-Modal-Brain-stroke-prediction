{% extends 'base.html' %}

{% block title %}Login - Stroke Prediction{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                    <i class="fas fa-user-md fa-2x text-primary"></i>
                </div>
                <h4 class="fw-bold">Welcome Back</h4>
                <p class="text-muted small">Sign in to your account</p>
            </div>

            {% if data %}
            <div class="alert alert-{% if 'failed' in data %}danger{% else %}success{% endif %} py-2">
                <i class="fas fa-{% if 'failed' in data %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>{{ data }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'UserLoginAction' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="t1" class="form-label fw-semibold">Username</label>
                    <input type="text" id="t1" name="t1" class="form-control form-control-lg" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="t2" class="form-label fw-semibold">Password</label>
                    <input type="password" id="t2" name="t2" class="form-control form-control-lg" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <hr class="my-3">
            <p class="text-center text-muted small mb-0">
                Don't have an account? <a href="{% url 'Register' %}" class="text-primary fw-semibold">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
