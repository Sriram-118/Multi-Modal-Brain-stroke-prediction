{% extends 'base.html' %}

{% block title %}Register - Stroke Prediction{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                    <i class="fas fa-user-plus fa-2x text-success"></i>
                </div>
                <h4 class="fw-bold">Create Account</h4>
                <p class="text-muted small">Register to access the prediction system</p>
            </div>

            {% if data %}
            <div class="alert alert-{% if 'already' in data %}warning{% elif 'completed' in data %}success{% else %}info{% endif %} py-2">
                <i class="fas fa-info-circle me-2"></i>{{ data }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'RegisterAction' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="t1" class="form-label fw-semibold">Username</label>
                    <input type="text" id="t1" name="t1" class="form-control" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="t2" class="form-label fw-semibold">Password</label>
                    <input type="password" id="t2" name="t2" class="form-control" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <div class="mb-3">
                    <label for="t3" class="form-label fw-semibold">Contact Number</label>
                    <input type="text" id="t3" name="t3" class="form-control" placeholder="Phone number" required>
                </div>
                <div class="mb-3">
                    <label for="t4" class="form-label fw-semibold">Email</label>
                    <input type="email" id="t4" name="t4" class="form-control" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="mb-4">
                    <label for="t5" class="form-label fw-semibold">Address</label>
                    <input type="text" id="t5" name="t5" class="form-control" placeholder="Your address" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <hr class="my-3">
            <p class="text-center text-muted small mb-0">
                Already have an account? <a href="{% url 'UserLogin' %}" class="text-primary fw-semibold">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
